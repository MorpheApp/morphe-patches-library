# Dependencies must also be added to LicensesDialog.java

[versions]
morphe-patcher = "1.3.3"
# Tracking https://github.com/google/smali/issues/100.
smali = "v2.4.0"
agp = "8.13.2"
gson = "2.13.2"
kotlin = "2.2.0"
annotation = "1.9.1"

[libraries]
annotation = { module = "androidx.annotation:annotation", version.ref = "annotation" }
gson = { module = "com.google.code.gson:gson", version.ref = "gson" }
morphe-patcher = { module = "app.morphe:morphe-patcher", version.ref = "morphe-patcher" }
smali = { module = "com.github.iBotPeaches.smali:smali", version.ref = "smali" }

[plugins]
android-library = { id = "com.android.library", version.ref = "agp" }
kotlin-android = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
